services:
  - type: web
    name: nyayabot-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 3001
      - key: CLIENT_URL
        value: https://nyayasaarthi.vercel.app
      - key: NODE_ENV
        value: production